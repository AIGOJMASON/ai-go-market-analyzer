name: Northstar Certification

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          path: AI_GO

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install deps
        working-directory: AI_GO
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validation probe
        run: |
          cd AI_GO
          source .venv/bin/activate
          PYTHONPATH=$GITHUB_WORKSPACE python -m AI_GO.tests.stage_e2e_contractor_validation_probe

      - name: Execution probe
        run: |
          cd AI_GO
          source .venv/bin/activate
          PYTHONPATH=$GITHUB_WORKSPACE python -m AI_GO.tests.stage_e2e_contractor_execution_probe
